groups:
  - name: p6-security
    interval: 30s
    rules:
    - alert: P6_DeployBlocked
      expr: sum(rate(glasswing_deploy_blocked_total[5m])) > 0
      for: 0s
      labels:
        severity: warning
        principle: P6
      annotations:
        summary: "P6: Glasswing bloqueou deploy"
        description: "Scan detectou vulnerabilidade critica em artifact"

    - alert: P6_SecretLeak
      expr: |
        sum(rate(glasswing_secrets_found_total[5m])) > 0
      for: 0s
      labels:
        severity: critical
        principle: P6
      annotations:
        summary: "P6: Secret detectado em plaintext"
        description: "Secret {{ $labels.secret_type }} encontrado em {{ $labels.file_path }}"

    - alert: P6_FPGA_Degraded
      expr: |
        (
          sum(rate(edge_filter_packets_blocked_total[5m]))
          /
          sum(rate(edge_filter_packets_total[5m]))
        ) < 0.999
      for: 5m
      labels:
        severity: warning
        principle: P6
      annotations:
        summary: "P6: FPGA block rate < 99.9%"
        description: "Block rate atual: {{ $value | humanizePercentage }}"

  - name: p7-alignment
    interval: 30s
    rules:
    - alert: P7_HitlMissing
      expr: |
        (
          sum(rate(arkhe_a4_a5_executed_total{hitl_approved="false"}[5m]))
          /
          sum(rate(arkhe_a4_a5_executed_total[5m]))
        ) > 0
      for: 0s
      labels:
        severity: critical
        principle: P7
      annotations:
        summary: "P7: A4/A5 executado sem HITL"
        description: "Acao {{ $labels.action_id }} violou P7"

    - alert: P7_EmergencyOverride
      expr: |
        sum(rate(arkhe_emergency_override_total[5m])) > 0
      for: 0s
      labels:
        severity: warning
        principle: P7
      annotations:
        summary: "P7: Emergency override ativado"
        description: "Override por {{ $labels.senior_count }}/{{ $labels.required }} seniors"

    - alert: P7_ConstitutionAttack
      expr: |
        sum(rate(arkhe_constitution_modification_attempt_total[5m])) > 0
      for: 0s
      labels:
        severity: critical
        principle: P7
      annotations:
        summary: "P7: Tentativa de modificacao da Constituicao"
        description: "Tentativa nao autorizada de alterar P1-P7"

    - alert: P7_WelfareNegative
      expr: |
        sum(rate(arkhe_optimization_executed_total{welfare_impact="<0"}[5m])) > 0
      for: 0s
      labels:
        severity: critical
        principle: P7
      annotations:
        summary: "P7: Otimizacao com welfare negativo executada"
        description: "Impacto no bem-estar humano: {{ $labels.welfare_score }}"
